name: Deploy Website

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17,47 * * * *'
  repository_dispatch:
    types:
      - wiki-content-updated
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ vars.CLOUDFLARE_API_TOKEN }}
          accountId: 8189d08dbcbde50b8f344f34f2422b98
          wranglerVersion: 4.110.0
          packageManager: pnpm
          command: deploy

      - name: Verify Cloudflare deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8189d08dbcbde50b8f344f34f2422b98
        run: pnpm exec wrangler deployments status --name 1flowbase-website --json
